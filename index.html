<style>
  html, body {
    font-family: 'Noto Sans JP', sans-serif !important;
    line-height: 1.6;
    background-color: #f8f8f8;
    padding: 20px 15px;
    color: #333;
    max-width: 760px;
    margin: 0 auto;
    font-size: 15px;
  }

  .main-title {
    font-size: 2.2em;
    color: #008f52;
    text-align: center;
    margin-bottom: 0.3em;
  }

  .subtitle {
    display: block;
    font-size: 0.6em;
    color: #666;
  }

  .section-title {
    background-color: #008f52;
    color: #fff;
    text-align: center;
    padding: 12px;
    font-size: 1.5em;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 30px;
    margin-bottom: 15px;
  }

  .section {
    background-color: #fff;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 5px solid #008f52;
  }

  h2 {
    color: #008f52;
    margin-top: 10px;
    margin-bottom: 10px;
    font-size: 1.2em;
  }

  h3 {
    margin-top: 15px;
    margin-bottom: 8px;
    font-size: 1.05em;
  }

  ul {
    margin: 5px 0;
    padding-left: 1.2em;
  }

  li {
    margin-bottom: 4px;
  }

  p {
    margin-bottom: 6px;
  }

  a {
    color: #008f52;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }
</style>
